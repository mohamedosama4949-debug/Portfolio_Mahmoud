<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#6E28D9"/>
    </linearGradient>
  </defs>
  <!-- Dark background square with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#080D1A"/>
  <!-- Circuit node dot -->
  <circle cx="10" cy="10" r="2.5" fill="url(#g)" opacity="0.7"/>
  <!-- PCB trace lines -->
  <line x1="10" y1="10" x2="22" y2="10" stroke="#00CFFF" stroke-width="1.2" opacity="0.5"/>
  <line x1="22" y1="10" x2="22" y2="22" stroke="#00CFFF" stroke-width="1.2" opacity="0.5"/>
  <circle cx="22" cy="22" r="2.5" fill="url(#g)" opacity="0.7"/>
  <!-- "M" initials text -->
  <text x="16" y="20" text-anchor="middle" font-family="Georgia,serif"
        font-size="10" font-weight="700" fill="url(#g)">MO</text>
</svg>
